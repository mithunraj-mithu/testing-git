name: Dev & Staging

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, closed]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      # TODO: Uncomment and configure AWS OIDC auth
      # - uses: aws-actions/configure-aws-credentials
      #     with:
      #       role-to-assume: ${{ vars.AWS_ROLE_ARN }}
      #       aws-region: eu-west-1
      # - run: |
      #     terraform -chdir=terraform init -backend-config=backends/development.conf
      #     terraform -chdir=terraform plan
      - name: Summary
        run: |
          echo "## Terraform Plan (Development)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Setup Required" >> $GITHUB_STEP_SUMMARY
          echo "1. Create a \`development\` GitHub Environment" >> $GITHUB_STEP_SUMMARY
          echo "2. Add \`AWS_ROLE_ARN\` variable to the environment" >> $GITHUB_STEP_SUMMARY
          echo "3. Update \`terraform/backends/development.conf\` with your state bucket" >> $GITHUB_STEP_SUMMARY
          echo "4. Uncomment the AWS and Terraform steps in this workflow" >> $GITHUB_STEP_SUMMARY
      # TODO: Update the message to include actual terraform plan output.
      # When wiring up real plans, capture output with:
      #   terraform -chdir=terraform plan -no-color -out=tfplan
      #   terraform -chdir=terraform show -no-color tfplan > plan.txt
      # then reference it in the message below. Remove this step if PR comments are not needed.
      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: terraform-plan
          message: |
            ## Terraform Plan — Development

            | Detail | Value |
            | ------ | ----- |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.event.pull_request.head.sha }}` |
            | **Environment** | development |
            | **Summary** | [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            > **Note:** Plan output will appear here once the Terraform steps are enabled.

  dev:
    name: Deploy to Development
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: plan
    environment: development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      # TODO: Uncomment and configure
      # - uses: aws-actions/configure-aws-credentials
      #     with:
      #       role-to-assume: ${{ vars.AWS_ROLE_ARN }}
      #       aws-region: eu-west-1
      # - run: |
      #     terraform -chdir=terraform init -backend-config=backends/development.conf
      #     terraform -chdir=terraform apply -auto-approve
      - name: Summary
        run: |
          echo "## Deploy to Development" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** #${{ github.event.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** development" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Placeholder — uncomment Terraform steps to enable" >> $GITHUB_STEP_SUMMARY

  cleanup:
    name: Destroy Development
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    environment: development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      # TODO: Uncomment and configure
      # - uses: aws-actions/configure-aws-credentials
      #     with:
      #       role-to-assume: ${{ vars.AWS_ROLE_ARN }}
      #       aws-region: eu-west-1
      # - run: |
      #     terraform -chdir=terraform init -backend-config=backends/development.conf
      #     terraform -chdir=terraform destroy -auto-approve
      - name: Summary
        run: |
          echo "## Destroy Development Resources" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** #${{ github.event.number }} (closed)" >> $GITHUB_STEP_SUMMARY
          echo "- **Action:** terraform destroy" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Placeholder — uncomment Terraform steps to enable" >> $GITHUB_STEP_SUMMARY

  staging:
    name: Deploy to Staging
    if: github.event_name == 'push'
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      # TODO: Uncomment and configure
      # - uses: aws-actions/configure-aws-credentials
      #     with:
      #       role-to-assume: ${{ vars.AWS_ROLE_ARN }}
      #       aws-region: eu-west-1
      # - run: |
      #     terraform -chdir=terraform init -backend-config=backends/staging.conf
      #     terraform -chdir=terraform apply -auto-approve
      - name: Summary
        run: |
          echo "## Deploy to Staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Placeholder — uncomment Terraform steps to enable" >> $GITHUB_STEP_SUMMARY
