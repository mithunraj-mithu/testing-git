name: Pipeline

on: [push]

env:
  GH_PACKAGE_TOKEN: ${{ secrets.SEMVER_TOKEN }}

jobs:
  test:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/

      - name: Run TFLint
        uses: reviewdog/action-tflint@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: "terraform"
          reporter: github-pr-review # ReviewDog comment on PR conversation
          fail_on_error: "true" # Fails pipeline run on TFLint errors
          flags: "" # Overrides default '--module' flag for TFLint

  release:
    name: Release
    needs: [test]
    if: github.ref == 'refs/heads/main_DELETE_ME_TO_RUN_RELEASE_ON_MAIN'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v1
        with:
          node-version: "18.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "alamy-ops"
          always-auth: true
      - run: |
          npm ci
          npm run build --if-present
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMVER_TOKEN }}
          NPM_TOKEN: ${{ secrets.SEMVER_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.SEMVER_TOKEN }}
          NPM_CONFIG_REGISTRY: https://npm.pkg.github.com # Required for semantic-release to publish to GH Packages instead of npm
        run: npm run semantic-release
